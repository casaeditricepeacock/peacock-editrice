<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Peacock — CRM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap');
:root{
  --ink:#0a1628;--ink2:#1a3a6b;--paper:#f0f4f8;--cream:#e2eaf3;
  --gold:#c4922a;--gold-light:#e8c97a;
  --red:#8b2635;--green:#2d5a3d;
  --muted:#5a6e8a;--border:#c2d0e0;--blue-light:#eef3fa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Mono',monospace;background:var(--paper);color:var(--ink);min-height:100vh;max-width:600px;margin:0 auto;}

/* HEADER */
.header{background:var(--ink);color:var(--paper);padding:14px 18px;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100;}
.header h1{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;letter-spacing:0.12em;text-transform:uppercase;}
.header-sub{font-size:0.46rem;color:var(--gold-light);letter-spacing:0.22em;text-transform:uppercase;margin-top:2px;}

/* TABS */
.tabs{background:var(--ink2);display:flex;}
.tab{flex:1;padding:10px 4px;font-size:0.54rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.5);border-bottom:2px solid transparent;font-family:'DM Mono',monospace;text-align:center;}
.tab.active{color:var(--gold-light);border-bottom-color:var(--gold);}

/* MAIN */
.main{padding:14px;}
.page{display:none;}.page.active{display:block;}

/* SEARCH / FILTER BAR */
.search-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.search-input{flex:1;padding:8px 10px;border:1px solid var(--border);background:white;font-family:'DM Mono',monospace;font-size:0.64rem;color:var(--ink);outline:none;}
.search-input:focus{border-color:var(--ink2);}
.cat-filter{padding:8px 10px;border:1px solid var(--border);background:white;font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--ink);outline:none;}
.btn-new{padding:8px 14px;background:var(--gold);color:var(--ink);border:none;font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;white-space:nowrap;}

/* CONTATTO CARD */
.contatto-card{background:white;border:1px solid var(--border);border-left:3px solid var(--border);margin-bottom:8px;padding:12px 14px;cursor:pointer;transition:all 0.15s;}
.contatto-card:active{background:var(--blue-light);}
.contatto-card.lib{border-left-color:#2e6fa8;}
.contatto-card.aut{border-left-color:var(--gold);}
.contatto-card.ass{border-left-color:var(--green);}
.contatto-card.gio{border-left-color:var(--red);}
.contatto-card.alt{border-left-color:var(--muted);}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;}
.c-nome{font-size:0.82rem;font-weight:500;}
.c-cat{font-size:0.48rem;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;border:1px solid var(--border);color:var(--muted);}
.c-org{font-size:0.62rem;color:var(--muted);margin-top:3px;}
.c-stato{display:flex;gap:8px;margin-top:6px;align-items:center;}
.stato-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stato-lbl{font-size:0.54rem;color:var(--muted);}
.c-last{font-size:0.52rem;color:var(--muted);margin-top:4px;}

/* CALENDARIO */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cal-nav{background:transparent;border:1px solid var(--border);padding:6px 12px;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--ink);}
.cal-mese{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:0.1em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:14px;}
.cal-day-label{text-align:center;font-size:0.46rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:4px 0;}
.cal-day{text-align:center;padding:6px 2px;font-size:0.62rem;cursor:pointer;border:1px solid transparent;min-height:32px;position:relative;}
.cal-day:hover{background:var(--cream);}
.cal-day.oggi{background:var(--ink2);color:white;font-weight:500;}
.cal-day.has-event::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold);}
.cal-day.oggi.has-event::after{background:var(--gold-light);}
.cal-day.altro-mese{color:var(--border);}
.eventi-list{margin-top:4px;}
.evento-item{background:white;border:1px solid var(--border);border-left:3px solid var(--gold);padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;}
.ev-tipo{font-size:0.48rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.ev-titolo{font-size:0.72rem;font-weight:500;}
.ev-data{font-size:0.56rem;color:var(--muted);}
.ev-note{font-size:0.58rem;color:var(--muted);margin-top:3px;font-style:italic;}
.tipo-social{border-left-color:#2e6fa8;}
.tipo-evento{border-left-color:var(--green);}
.tipo-blog{border-left-color:var(--red);}
.tipo-fiera{border-left-color:#7c3fa0;}
.tipo-altro{border-left-color:var(--muted);}

/* DA FARE */
.todo-item{background:white;border:1px solid var(--border);border-left:3px solid var(--border);padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;}
.todo-item.scaduto{border-left-color:var(--red);background:rgba(139,38,53,0.03);}
.todo-item.oggi-todo{border-left-color:var(--gold);}
.todo-check{width:18px;height:18px;accent-color:var(--gold);flex-shrink:0;margin-top:2px;cursor:pointer;}
.todo-body{flex:1;}
.todo-desc{font-size:0.7rem;}
.todo-meta{font-size:0.54rem;color:var(--muted);margin-top:3px;}
.todo-item.done{opacity:0.5;}
.todo-item.done .todo-desc{text-decoration:line-through;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(10,22,40,0.65);display:none;align-items:flex-end;justify-content:center;z-index:200;}
.overlay.open{display:flex;}
.modal{background:var(--paper);border-top:3px solid var(--gold);padding:20px 18px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-h{font-family:'Cormorant Garamond',serif;font-size:1.1rem;margin-bottom:16px;color:var(--ink2);}
.f-group{margin-bottom:10px;}
.f-label{font-size:0.48rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:block;}
.f-input,.f-select,.f-textarea{width:100%;padding:9px 10px;border:1px solid var(--border);background:white;font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--ink);outline:none;}
.f-input:focus,.f-select:focus,.f-textarea:focus{border-color:var(--ink2);}
.f-textarea{resize:vertical;min-height:70px;line-height:1.5;}
.f-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-prim{flex:1;padding:11px;font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;border:none;background:var(--gold);color:var(--ink);}
.btn-sec{padding:11px 16px;font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);}
.btn-del-m{padding:11px 14px;font-family:'DM Mono',monospace;font-size:0.6rem;cursor:pointer;border:1px solid var(--red);background:transparent;color:var(--red);}

/* SEZIONE ATTIVITA nel dettaglio contatto */
.att-item{padding:8px 0;border-bottom:1px solid var(--cream);font-size:0.64rem;}
.att-tipo{display:inline-block;padding:1px 7px;font-size:0.48rem;letter-spacing:0.08em;text-transform:uppercase;border:1px solid var(--border);margin-right:6px;color:var(--muted);}
.att-data{color:var(--muted);font-size:0.52rem;}

/* TOAST */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--ink2);color:white;padding:9px 18px;font-size:0.6rem;letter-spacing:0.1em;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;border-left:3px solid var(--gold);white-space:nowrap;}

.empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:0.68rem;line-height:1.8;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:0.66rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
</style>
</head>

<script>
const JKEY = '$2a$10$fjUl8IVz2yeZDM9YIaHrk.5c2W8C7Lb1weJR8ye/zj.LHB3z4kHkm';
const JBIN = ''; // da configurare
const SK = 'peacock_auth';

// Usa localStorage come storage principale — nessun bin separato per ora
const LS_KEY = 'peacock_crm';

let DATA = {contatti:[], eventi:[], todo:[]};
let EDIT_CONT = null, EDIT_EV = null, EDIT_TODO = null;
let CAL_ANNO = new Date().getFullYear(), CAL_MESE = new Date().getMonth();

const CAT_LABEL = {lib:'Libreria',aut:'Autore',ass:'Associazione',gio:'Giornalista',alt:'Altro'};
const CAT_CLS   = {lib:'lib',aut:'aut',ass:'ass',gio:'gio',alt:'alt'};
const STATO_COLOR = {
  da_contattare:'#5a6e8a', contattato:'#2e6fa8', in_attesa:'#c4922a',
  positivo:'#2d5a3d', negativo:'#8b2635', attivo:'#2d5a3d'
};
const STATO_LABEL = {
  da_contattare:'Da contattare', contattato:'Contattato', in_attesa:'In attesa',
  positivo:'Positivo', negativo:'Non interessato', attivo:'Attivo'
};
const TIPO_ATT = {mail:'Mail',tel:'Tel.',msg:'Msg',incontro:'Incontro',altro:'Altro'};
const TIPO_EV_CLS = {evento:'tipo-evento',fiera:'tipo-fiera',social:'tipo-social',blog:'tipo-blog',altro:'tipo-altro'};
const MESI_L = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function carica(){ try{ const s=localStorage.getItem(LS_KEY); if(s) DATA=JSON.parse(s); }catch(e){} }
function salva(){ localStorage.setItem(LS_KEY,JSON.stringify(DATA)); }

// TABS
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('page-'+this.dataset.page).classList.add('active');
    if(this.dataset.page==='contatti') renderContatti();
    if(this.dataset.page==='calendario') renderCalendario();
    if(this.dataset.page==='dafare') renderTodo();
  });
});

// ── CONTATTI ──────────────────────────────────────────────
document.getElementById('search-cont').addEventListener('input',renderContatti);
document.getElementById('filter-cat').addEventListener('change',renderContatti);

function renderContatti(){
  const cerca = document.getElementById('search-cont').value.toLowerCase();
  const cat   = document.getElementById('filter-cat').value;
  let cc = [...DATA.contatti];
  if(cerca) cc=cc.filter(c=>(c.nome+' '+c.cognome+' '+(c.org||'')).toLowerCase().includes(cerca));
  if(cat) cc=cc.filter(c=>c.cat===cat);
  cc.sort((a,b)=>(a.nome+a.cognome).localeCompare(b.nome+b.cognome));

  const el = document.getElementById('lista-contatti');
  if(!cc.length){ el.innerHTML='<div class="empty">Nessun contatto.<br>Tocca + per aggiungere.</div>'; return; }

  el.innerHTML = cc.map(c=>{
    const lastAtt = c.attivita?.slice(-1)[0];
    const lastStr = lastAtt ? TIPO_ATT[lastAtt.tipo]+' — '+new Date(lastAtt.data).toLocaleDateString('it-IT') : '';
    return `<div class="contatto-card ${CAT_CLS[c.cat]||'alt'}" onclick="apriModalContatto('${c.id}')">
      <div class="c-top">
        <div class="c-nome">${c.nome} ${c.cognome||''}</div>
        <span class="c-cat">${CAT_LABEL[c.cat]||'Altro'}</span>
      </div>
      ${c.org?`<div class="c-org">${c.org}</div>`:''}
      <div class="c-stato">
        <div class="stato-dot" style="background:${STATO_COLOR[c.stato]||'#999'}"></div>
        <span class="stato-lbl">${STATO_LABEL[c.stato]||''}</span>
      </div>
      ${lastStr?`<div class="c-last">Ultimo contatto: ${lastStr}</div>`:''}
    </div>`;
  }).join('');
}

function apriModalContatto(id){
  EDIT_CONT = id;
  const c = id ? DATA.contatti.find(x=>x.id===id) : null;
  document.getElementById('mh-contatto').textContent = id ? 'Modifica contatto' : 'Nuovo contatto';
  document.getElementById('btn-mc-del').style.display = id ? '' : 'none';
  document.getElementById('mc-att-section').style.display = id ? '' : 'none';
  document.getElementById('mc-nome').value    = c?.nome||'';
  document.getElementById('mc-cognome').value = c?.cognome||'';
  document.getElementById('mc-org').value     = c?.org||'';
  document.getElementById('mc-cat').value     = c?.cat||'lib';
  document.getElementById('mc-email').value   = c?.email||'';
  document.getElementById('mc-tel').value     = c?.tel||'';
  document.getElementById('mc-citta').value   = c?.citta||'';
  document.getElementById('mc-stato').value   = c?.stato||'da_contattare';
  document.getElementById('mc-note').value    = c?.note||'';
  document.getElementById('mc-att-data').value = new Date().toISOString().slice(0,10);
  if(id) renderAttivita(c);
  document.getElementById('ov-contatto').classList.add('open');
}

function renderAttivita(c){
  const list = document.getElementById('mc-att-list');
  const att = c?.attivita||[];
  if(!att.length){ list.innerHTML='<div style="font-size:0.6rem;color:var(--muted);padding:4px 0">Nessuna attività registrata.</div>'; return; }
  list.innerHTML = [...att].reverse().map(a=>`
    <div class="att-item">
      <span class="att-tipo">${TIPO_ATT[a.tipo]||a.tipo}</span>
      <span class="att-data">${new Date(a.data).toLocaleDateString('it-IT')}</span>
      ${a.note?`<div style="font-size:0.6rem;color:var(--muted);margin-top:3px">${a.note}</div>`:''}
    </div>`).join('');
}

function aggiungiAttivita(){
  if(!EDIT_CONT) return;
  const tipo = document.getElementById('mc-att-tipo').value;
  const data = document.getElementById('mc-att-data').value || new Date().toISOString().slice(0,10);
  const note = document.getElementById('mc-att-note').value.trim();
  const c = DATA.contatti.find(x=>x.id===EDIT_CONT);
  if(!c) return;
  if(!c.attivita) c.attivita=[];
  c.attivita.push({id:Date.now(),tipo,data,note});
  salva(); renderAttivita(c);
  document.getElementById('mc-att-note').value='';
  toast('Attività aggiunta');
}

document.getElementById('btn-mc-salva').addEventListener('click',()=>{
  const nome = document.getElementById('mc-nome').value.trim();
  if(!nome){ toast('Inserisci il nome'); return; }
  const obj = {
    nome, cognome:document.getElementById('mc-cognome').value.trim(),
    org:document.getElementById('mc-org').value.trim(),
    cat:document.getElementById('mc-cat').value,
    email:document.getElementById('mc-email').value.trim(),
    tel:document.getElementById('mc-tel').value.trim(),
    citta:document.getElementById('mc-citta').value.trim(),
    stato:document.getElementById('mc-stato').value,
    note:document.getElementById('mc-note').value.trim()
  };
  if(EDIT_CONT){
    const idx=DATA.contatti.findIndex(x=>x.id===EDIT_CONT);
    obj.id=EDIT_CONT; obj.attivita=DATA.contatti[idx].attivita||[];
    DATA.contatti[idx]=obj;
  } else { obj.id=Date.now().toString(); obj.attivita=[]; DATA.contatti.push(obj); }
  salva(); chiudiModal('ov-contatto'); renderContatti(); toast('Contatto salvato');
});

function eliminaContatto(){
  if(!confirm('Eliminare questo contatto?')) return;
  DATA.contatti=DATA.contatti.filter(c=>c.id!==EDIT_CONT);
  salva(); chiudiModal('ov-contatto'); renderContatti(); toast('Eliminato');
}

// ── CALENDARIO ────────────────────────────────────────────
document.getElementById('cal-prev').addEventListener('click',()=>{ CAL_MESE--; if(CAL_MESE<0){CAL_MESE=11;CAL_ANNO--;} renderCalendario(); });
document.getElementById('cal-next').addEventListener('click',()=>{ CAL_MESE++; if(CAL_MESE>11){CAL_MESE=0;CAL_ANNO++;} renderCalendario(); });

function renderCalendario(){
  document.getElementById('cal-mese-label').textContent = MESI_L[CAL_MESE]+' '+CAL_ANNO;
  const oggi = new Date(); oggi.setHours(0,0,0,0);
  const primoGiorno = new Date(CAL_ANNO,CAL_MESE,1).getDay();
  const giorniMese  = new Date(CAL_ANNO,CAL_MESE+1,0).getDate();
  const offset = (primoGiorno+6)%7; // lun=0

  const eventiMese = DATA.eventi.filter(e=>{
    const d=new Date(e.data); return d.getFullYear()===CAL_ANNO&&d.getMonth()===CAL_MESE;
  });
  const giorniConEventi = new Set(eventiMese.map(e=>new Date(e.data).getDate()));

  let html = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(g=>`<div class="cal-day-label">${g}</div>`).join('');
  for(let i=0;i<offset;i++) html+=`<div class="cal-day altro-mese"></div>`;
  for(let d=1;d<=giorniMese;d++){
    const thisDate=new Date(CAL_ANNO,CAL_MESE,d); thisDate.setHours(0,0,0,0);
    const isOggi=thisDate.getTime()===oggi.getTime();
    const hasEv=giorniConEventi.has(d);
    html+=`<div class="cal-day${isOggi?' oggi':''}${hasEv?' has-event':''}" onclick="filtraEventiGiorno(${d})">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;

  // Lista eventi del mese
  renderListaEventi(eventiMese);
}

let filtroGiorno = null;
function filtraEventiGiorno(g){
  filtroGiorno = filtroGiorno===g ? null : g;
  const eventiMese=DATA.eventi.filter(e=>{
    const d=new Date(e.data); return d.getFullYear()===CAL_ANNO&&d.getMonth()===CAL_MESE;
  });
  const filtrati=filtroGiorno?eventiMese.filter(e=>new Date(e.data).getDate()===filtroGiorno):eventiMese;
  renderListaEventi(filtrati);
}

function renderListaEventi(ee){
  const el=document.getElementById('lista-eventi');
  if(!ee.length){ el.innerHTML='<div class="empty">Nessun evento questo mese.</div>'; return; }
  ee.sort((a,b)=>new Date(a.data)-new Date(b.data));
  el.innerHTML=ee.map(e=>`
    <div class="evento-item ${TIPO_EV_CLS[e.tipo]||'tipo-altro'}" onclick="apriModalEvento('${e.id}')">
      <div>
        <div class="ev-tipo">${e.tipo||'evento'}</div>
        <div class="ev-titolo">${e.titolo}</div>
        ${e.luogo?`<div class="ev-note">${e.luogo}</div>`:''}
        ${e.note?`<div class="ev-note">${e.note}</div>`:''}
      </div>
      <div class="ev-data">${new Date(e.data).toLocaleDateString('it-IT',{day:'numeric',month:'short'})}</div>
    </div>`).join('');
}

function apriModalEvento(id){
  EDIT_EV=id;
  const e=id?DATA.eventi.find(x=>x.id===id):null;
  document.getElementById('mh-evento').textContent=id?'Modifica evento':'Nuovo evento';
  document.getElementById('btn-me-del').style.display=id?'':'none';
  document.getElementById('me-titolo').value=e?.titolo||'';
  document.getElementById('me-tipo').value=e?.tipo||'evento';
  document.getElementById('me-data').value=e?.data||new Date().toISOString().slice(0,10);
  document.getElementById('me-luogo').value=e?.luogo||'';
  document.getElementById('me-note').value=e?.note||'';
  document.getElementById('ov-evento').classList.add('open');
}

document.getElementById('btn-me-salva').addEventListener('click',()=>{
  const titolo=document.getElementById('me-titolo').value.trim();
  const data=document.getElementById('me-data').value;
  if(!titolo||!data){ toast('Inserisci titolo e data'); return; }
  const obj={titolo,tipo:document.getElementById('me-tipo').value,data,luogo:document.getElementById('me-luogo').value.trim(),note:document.getElementById('me-note').value.trim()};
  if(EDIT_EV){ obj.id=EDIT_EV; DATA.eventi[DATA.eventi.findIndex(x=>x.id===EDIT_EV)]=obj; }
  else{ obj.id=Date.now().toString(); DATA.eventi.push(obj); }
  // Aggiorna CAL_MESE/ANNO alla data dell'evento
  const d=new Date(data); CAL_ANNO=d.getFullYear(); CAL_MESE=d.getMonth();
  salva(); chiudiModal('ov-evento'); renderCalendario(); toast('Evento salvato');
});

function eliminaEvento(){
  if(!confirm('Eliminare?')) return;
  DATA.eventi=DATA.eventi.filter(e=>e.id!==EDIT_EV);
  salva(); chiudiModal('ov-evento'); renderCalendario(); toast('Eliminato');
}

// ── DA FARE ───────────────────────────────────────────────
function renderTodo(){
  const oggi=new Date(); oggi.setHours(0,0,0,0);
  const tt=[...DATA.todo].sort((a,b)=>{
    if(a.done&&!b.done) return 1;
    if(!a.done&&b.done) return -1;
    return new Date(a.data||'9999')-new Date(b.data||'9999');
  });
  const el=document.getElementById('lista-todo');
  if(!tt.length){ el.innerHTML='<div class="empty">Nessuna attività.<br>Tocca + per aggiungere.</div>'; return; }
  el.innerHTML=tt.map(t=>{
    const d=t.data?new Date(t.data):null; if(d) d.setHours(0,0,0,0);
    const scaduto=d&&d<oggi&&!t.done;
    const oggiTodo=d&&d.getTime()===oggi.getTime()&&!t.done;
    return `<div class="todo-item${scaduto?' scaduto':oggiTodo?' oggi-todo':''}${t.done?' done':''}">
      <input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleTodo('${t.id}',this.checked)">
      <div class="todo-body" onclick="apriModalTodo('${t.id}')">
        <div class="todo-desc">${t.desc}</div>
        <div class="todo-meta">${TIPO_ATT[t.tipo]||t.tipo}${t.contatto?' · '+t.contatto:''}${t.data?' · '+new Date(t.data).toLocaleDateString('it-IT'):''}</div>
        ${t.note?`<div style="font-size:0.54rem;color:var(--muted);margin-top:2px">${t.note}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleTodo(id,done){
  const t=DATA.todo.find(x=>x.id===id);
  if(t){ t.done=done; salva(); renderTodo(); }
}

function apriModalTodo(id){
  EDIT_TODO=id;
  const t=id?DATA.todo.find(x=>x.id===id):null;
  document.getElementById('btn-mt-del').style.display=id?'':'none';
  document.getElementById('mt-desc').value=t?.desc||'';
  document.getElementById('mt-tipo').value=t?.tipo||'mail';
  document.getElementById('mt-data').value=t?.data||'';
  document.getElementById('mt-contatto').value=t?.contatto||'';
  document.getElementById('mt-note').value=t?.note||'';
  document.getElementById('ov-todo').classList.add('open');
}

document.getElementById('btn-mt-salva').addEventListener('click',()=>{
  const desc=document.getElementById('mt-desc').value.trim();
  if(!desc){ toast('Inserisci descrizione'); return; }
  const obj={desc,tipo:document.getElementById('mt-tipo').value,data:document.getElementById('mt-data').value,contatto:document.getElementById('mt-contatto').value.trim(),note:document.getElementById('mt-note').value.trim(),done:false};
  if(EDIT_TODO){ obj.id=EDIT_TODO; obj.done=DATA.todo.find(x=>x.id===EDIT_TODO)?.done||false; DATA.todo[DATA.todo.findIndex(x=>x.id===EDIT_TODO)]=obj; }
  else{ obj.id=Date.now().toString(); DATA.todo.push(obj); }
  salva(); chiudiModal('ov-todo'); renderTodo(); toast('Attività salvata');
});

function eliminaTodo(){
  if(!confirm('Eliminare?')) return;
  DATA.todo=DATA.todo.filter(t=>t.id!==EDIT_TODO);
  salva(); chiudiModal('ov-todo'); renderTodo(); toast('Eliminato');
}

// ── UTILS ─────────────────────────────────────────────────
function chiudiModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',function(e){ if(e.target===this) this.classList.remove('open'); }));
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2500); }

document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});

// INIT
carica();
renderContatti();
</script>
